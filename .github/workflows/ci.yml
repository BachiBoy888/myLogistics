name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install (root)
        run: npm ci

      - name: Build (root)
        run: npm run build --if-present

      - name: Install (server)
        run: npm ci
        working-directory: server

      - name: Test (server)
        run: npm test --if-present
        working-directory: server
