name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install (root)
        run: npm ci

      - name: Build (root)
        run: npm run build --if-present

      - name: Install (server)
        run: npm ci
        working-directory: server

      - name: Test (server) if configured
        working-directory: server
        run: |
          if npm pkg get scripts.test | grep -q '"test":'; then
            TEST_SCRIPT=$(npm pkg get scripts.test)
            echo "Detected test script: $TEST_SCRIPT"
            if echo "$TEST_SCRIPT" | grep -q 'no test specified'; then
              echo "No real tests configured (placeholder). Skipping."
              exit 0
            fi
            npm test
          else
            echo "No test script found. Skipping."
          fi
